<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Copilot — Pitch Presentation</title>

  <!-- Reveal.js core CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
  <!-- Theme – dark professional look -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css" id="theme" />
  <!-- Syntax highlighting for code blocks -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css" />

  <style>
    /* GitHub-themed presentation */
    :root {
      --r-background-color: #0d1117;
      --r-main-color: #c9d1d9;
      --r-heading-color: #58a6ff;
      --r-link-color: #58a6ff;
      --github-green: #3fb950;
      --github-purple: #a371f7;
      --github-border: #30363d;
      --copilot-gradient: linear-gradient(135deg, #58a6ff, #a371f7);
    }
    .reveal .slides section {
      text-align: left;
    }
    .reveal .slides section.center-slide {
      text-align: center;
    }
    .reveal h1, .reveal h2, .reveal h3 {
      text-transform: none;
    }
    .stat-number {
      font-size: 2.5em;
      font-weight: bold;
      background: var(--copilot-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .gradient-text {
      background: var(--copilot-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: bold;
    }
    .highlight-box {
      background: rgba(88,166,255,0.08);
      border-left: 3px solid #58a6ff;
      padding: 0.8em 1em;
      margin: 0.5em 0;
      border-radius: 6px;
    }
    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2em;
    }
    .competitor-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.7em;
    }
    .competitor-table th, .competitor-table td {
      border: 1px solid var(--github-border);
      padding: 0.5em;
    }
    .competitor-table th {
      background: rgba(163,113,247,0.15);
      color: #a371f7;
    }
    .competitor-table td:nth-child(2) {
      color: var(--github-green);
    }
    .github-icon::before {
      content: "▸ ";
      color: #a371f7;
      font-weight: bold;
    }
    .copilot-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1em;
    }
    .reveal ul {
      list-style: none;
      padding-left: 0;
    }
    .reveal ul li {
      padding-left: 1.2em;
      position: relative;
      margin-bottom: 0.4em;
    }
    .reveal ul li::before {
      content: "▸";
      color: #a371f7;
      font-weight: bold;
      position: absolute;
      left: 0;
    }
    .tag {
      display: inline-block;
      background: rgba(163,113,247,0.15);
      color: #a371f7;
      padding: 0.15em 0.6em;
      border-radius: 2em;
      font-size: 0.75em;
      border: 1px solid rgba(163,113,247,0.3);
    }
    .check-green {
      color: var(--github-green);
    }
    .cross-dim {
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">

      <!--
        ╔══════════════════════════════════════════════════════════════╗
        ║  SLIDES GO HERE                                            ║
        ║                                                            ║
        ║  Copilot: Replace this comment block with all the          ║
        ║  presentation slides. Follow the structure defined in      ║
        ║  .github/copilot-instructions.md exactly.                  ║
        ║                                                            ║
        ║  Each slide is a <section> element.                        ║
        ║  Vertical stacks use nested <section> elements.            ║
        ║  Speaker notes use <aside class="notes"> inside slides.    ║
        ║                                                            ║
        ║  Example slide:                                            ║
        ║  <section>                                                 ║
        ║    <h2>Slide Title</h2>                                    ║
        ║    <p>Content here</p>                                     ║
        ║    <aside class="notes">                                   ║
        ║      Speaker notes — what to say during this slide.        ║
        ║    </aside>                                                ║
        ║  </section>                                                ║
        ╚══════════════════════════════════════════════════════════════╝
      -->

    </div>
  </div>

  <!-- Reveal.js core + plugins -->
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>

  <script>
    Reveal.initialize({
      hash: true,
      slideNumber: true,
      showNotes: false,        // notes visible only in speaker view (press S)
      transition: 'slide',
      transitionSpeed: 'default',
      controlsTutorial: false,
      plugins: [
        RevealNotes,
        RevealHighlight,
        RevealMarkdown
      ]
    });
  </script>
</body>
</html>
